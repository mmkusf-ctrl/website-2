<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>sync’d | Luxury Jewelry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
</head>

<body class="fade-in home-page-body">

  <!-- minimalist HEADER -->
  <header class="top-header minimalist">
    <div class="header-left">
    </div>

    <div class="header-center search-container">
      <div class="search-pill">
        <input type="text" placeholder="SEARCH HERE..." />
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
    </div>

    <div class="header-right header-actions">
      <!-- ACCOUNT -->
      <div class="account-wrapper">
        <button class="icon-btn-vertical" id="accountBtn">
          <svg class="icon icon-account" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
            width="30" height="30">
            <path
              d="M12 2C9.243 2 7 4.243 7 7s2.243 5 5 5 5-2.243 5-5-2.243-5-5-5zm0 12c-4.418 0-8 3.582-8 8v1h16v-1c0-4.418-3.582-8-8-8z" />
          </svg>
          <span class="label">ACCOUNT</span>
        </button>
        <div class="account-dropdown" id="accountMenu">
          <a href="profile.html">Profile</a>
          <a href="orders.html">Orders</a>
          <a href="#">Logout</a>
        </div>
      </div>

      <!-- CART -->
      <button class="icon-btn-vertical cart-btn" id="cartBtn">
        <div class="cart-icon-wrapper">
          <svg class="icon icon-cart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="#e63946" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <circle cx="9" cy="21" r="1.5"></circle>
            <circle cx="20" cy="21" r="1.5"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </div>
        <span class="label">CART</span>
      </button>
    </div>
  </header>

  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button id="closeCart">✕</button>
    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="cart-footer">
      <p>Total: $<span id="cartTotal">0</span></p>
      <a href="checkout.html" class="checkout-btn">Checkout</a>
    </div>
  </div>

  <div class="cart-overlay" id="cartOverlay"></div>

  <script>
    // ACCOUNT DROPDOWN
    const accountBtn = document.getElementById("accountBtn");
    const accountMenu = document.getElementById("accountMenu");

    accountBtn.addEventListener("click", () => {
      accountMenu.style.display =
        accountMenu.style.display === "flex" ? "none" : "flex";
    });

    // CART DRAWER
    const cartBtn = document.getElementById("cartBtn");
    const cartDrawer = document.getElementById("cartDrawer");
    const cartOverlay = document.getElementById("cartOverlay");
    const closeCart = document.getElementById("closeCart");

    cartBtn.onclick = () => {
      cartDrawer.classList.add("open");
      cartOverlay.classList.add("show");
      renderCart();
    };

    closeCart.onclick = closeCartDrawer;
    cartOverlay.onclick = closeCartDrawer;

    function closeCartDrawer() {
      cartDrawer.classList.remove("open");
      cartOverlay.classList.remove("show");
    }

    // CART LOGIC
    function renderCart() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const cartItems = document.getElementById("cartItems");
      const cartTotal = document.getElementById("cartTotal");
      const cartCount = document.getElementById("cartCount");

      cartItems.innerHTML = "";
      let total = 0;
      let count = 0;

      cart.forEach(item => {
        total += item.price * item.quantity;
        count += item.quantity;

        cartItems.innerHTML += `
        <div class="cart-item">
          <span>${item.name} x ${item.quantity}</span>
          <span>$${item.price * item.quantity}</span>
        </div>
      `;
      });

      cartTotal.textContent = total.toFixed(2);
      cartCount.textContent = count;
    }

    renderCart();
  </script>

  <main class="home-main">
    <div class="home-center-content">
      <img src="logo1.png" alt="sync'd ...with your beauty" class="home-main-logo" />

      <div class="home-buttons">
        <a href="premium-collection.html" class="home-btn">PREMIUM COLLECTION</a>
        <a href="pearl-collection.html" class="home-btn">PEARL COLLECTION</a>
      </div>
    </div>
  </main>



  <script>
    // SMOOTH PAGE TRANSITIONS
    document.addEventListener("DOMContentLoaded", () => {
      const links = document.querySelectorAll("a[href]");
      links.forEach(link => {
        link.addEventListener("click", e => {
          const target = link.getAttribute("href");

          // Skip external links, new tabs, or empty links
          if (!target || target.startsWith("http") || link.target === "_blank") return;

          if (target.startsWith("#")) {
            // Smooth scroll internal anchor links
            e.preventDefault();
            const element = document.querySelector(target);
            if (element) {
              element.scrollIntoView({ behavior: "smooth" });
            }
            return;
          }

          if (!target.startsWith("javascript:void(0)")) {
            // Handle regular page navigation with fade-out
            e.preventDefault();
            document.body.classList.remove("fade-in");
            document.body.classList.add("fade-out");
            setTimeout(() => {
              window.location.href = target;
            }, 450); // Slightly less than transition duration to ensure smoothness
          }
        });
      });
    });
  </script>
</body>

</html>
